<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>(function(){var t=localStorage.getItem('sc-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Shopcast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <i class="fa-solid fa-moon"></i>
</button>

<div class="auth-page">
  <div class="auth-wrapper">

    <!-- Brand -->
    <a href="#" class="auth-brand">
      <div class="brand-icon">S</div>
      <span class="brand-text">Shopcast</span>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <!-- Alert placeholder -->
      <div id="loginAlert" style="display:none;"></div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-floating-custom">
          <input type="email" id="loginEmail" class="form-control" placeholder="email" autocomplete="email" />
          <label for="loginEmail"><i class="fa-regular fa-envelope" style="margin-right:6px;font-size:12px;"></i>Email address</label>
          <i class="fa-regular fa-envelope input-icon"></i>
        </div>
        <div class="field-msg" id="emailMsg"></div>

        <!-- Password -->
        <div class="form-floating-custom" style="margin-top:14px;">
          <input type="password" id="loginPassword" class="form-control" placeholder="password" autocomplete="current-password" />
          <label for="loginPassword"><i class="fa-solid fa-lock" style="margin-right:6px;font-size:12px;"></i>Password</label>
          <i class="fa-regular fa-eye input-icon toggle-pw"></i>
        </div>
        <div class="field-msg" id="pwdMsg"></div>

        <!-- Meta row -->
        <div class="auth-meta" style="margin-top:14px;">
          <label class="custom-check">
            <input type="checkbox" id="rememberMe" />
            <span class="check-box"><i class="fa-solid fa-check"></i></span>
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" style="font-size:13px;font-weight:600;">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary-auth" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <div class="spinner"></div>
        </button>

      </form>

      <!-- Divider -->
      <div class="social-divider">or continue with</div>

      <!-- Social -->
      <div class="social-btns">
        <button class="btn-social btn-social-google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <button class="btn-social btn-social-facebook" type="button">
          <i class="fab fa-facebook" style="color:#1877f2;font-size:18px;"></i>
          Sign in with Facebook
        </button>
      </div>

    </div><!-- /card -->

    <!-- Footer -->
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </div><!-- /wrapper -->
</div><!-- /page -->

<!-- Demo page nav -->
<nav class="page-nav">
  <a href="login.html" class="active">Login</a>
  <a href="register.html">Register</a>
  <a href="forgot-password.html">Forgot</a>
  <a href="reset-password.html">Reset</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/core.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
