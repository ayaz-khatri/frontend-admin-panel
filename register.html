<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>(function(){var t=localStorage.getItem('sc-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Shopcast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    /* Register page needs a wider card */
    .auth-wrapper { max-width: 500px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <i class="fa-solid fa-moon"></i>
</button>

<div class="auth-page">
  <div class="auth-wrapper">

    <a href="#" class="auth-brand">
      <div class="brand-icon">S</div>
      <span class="brand-text">Shopcast</span>
    </a>

    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Create an account</h1>
        <p>Fill in the details below to get started</p>
      </div>

      <div id="regAlert" style="display:none;"></div>

      <form id="registerForm" novalidate>

        <!-- Two-column row: Name + Email -->
        <div class="two-col">
          <div>
            <div class="form-floating-custom">
              <input type="text" id="regName" class="form-control" placeholder="name" autocomplete="name" />
              <label for="regName"><i class="fa-regular fa-user" style="margin-right:6px;font-size:12px;"></i>Full Name</label>
              <i class="fa-regular fa-user input-icon"></i>
            </div>
            <div class="field-msg" id="regNameMsg"></div>
          </div>
          <div>
            <div class="form-floating-custom">
              <input type="email" id="regEmail" class="form-control" placeholder="email" autocomplete="email" />
              <label for="regEmail"><i class="fa-regular fa-envelope" style="margin-right:6px;font-size:12px;"></i>Email</label>
              <i class="fa-regular fa-envelope input-icon"></i>
            </div>
            <div class="field-msg" id="regEmailMsg"></div>
          </div>
        </div>

        <!-- Gender -->
        <div style="margin-top:4px; margin-bottom:4px;">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Gender</div>
          <div class="gender-group">
            <label class="gender-option">
              <input type="radio" name="gender" value="male" />
              <span class="gender-icon">♂</span> Male
            </label>
            <label class="gender-option">
              <input type="radio" name="gender" value="female" />
              <span class="gender-icon">♀</span> Female
            </label>
            <label class="gender-option">
              <input type="radio" name="gender" value="other" />
              <span class="gender-icon">◎</span> Other
            </label>
          </div>
          <div class="field-msg" id="genderMsg"></div>
        </div>

        <!-- Password -->
        <div class="form-floating-custom" style="margin-top:4px;">
          <input type="password" id="password" class="form-control" placeholder="password"
                 autocomplete="new-password" data-strength="strengthMeter" />
          <label for="password"><i class="fa-solid fa-lock" style="margin-right:6px;font-size:12px;"></i>Password</label>
          <i class="fa-regular fa-eye input-icon toggle-pw"></i>
        </div>
        <div class="field-msg" id="passwordMsg"></div>

        <!-- Strength meter -->
        <div class="strength-meter" id="strengthMeter">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:11px;color:var(--text-muted);">Password strength</span>
            <span class="strength-label"></span>
          </div>
          <div class="strength-bars">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <div class="strength-rules">
            <div class="rule-item" data-rule="length">
              <span class="rule-icon"><i class="fa-solid fa-xmark"></i></span>
              At least 8 characters
            </div>
            <div class="rule-item" data-rule="upper">
              <span class="rule-icon"><i class="fa-solid fa-xmark"></i></span>
              One uppercase letter
            </div>
            <div class="rule-item" data-rule="lower">
              <span class="rule-icon"><i class="fa-solid fa-xmark"></i></span>
              One lowercase letter
            </div>
            <div class="rule-item" data-rule="number">
              <span class="rule-icon"><i class="fa-solid fa-xmark"></i></span>
              One number
            </div>
            <div class="rule-item" data-rule="special">
              <span class="rule-icon"><i class="fa-solid fa-xmark"></i></span>
              One special character
            </div>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-floating-custom" style="margin-top:14px;">
          <input type="password" id="confirmPassword" class="form-control" placeholder="confirm"
                 autocomplete="new-password" />
          <label for="confirmPassword"><i class="fa-solid fa-lock-open" style="margin-right:6px;font-size:12px;"></i>Confirm Password</label>
          <i class="fa-regular fa-eye input-icon toggle-pw"></i>
        </div>
        <div class="field-msg" id="confirmPasswordMsg"></div>

        <!-- Terms -->
        <div style="margin-top:16px;">
          <label class="custom-check">
            <input type="checkbox" id="termsCheck" />
            <span class="check-box"><i class="fa-solid fa-check"></i></span>
            <span>I agree to the <a href="#" style="font-weight:600;">Terms of Service</a> and <a href="#" style="font-weight:600;">Privacy Policy</a></span>
          </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary-auth" id="registerBtn" style="margin-top:18px;">
          <span class="btn-label">Create Account</span>
          <div class="spinner"></div>
        </button>

      </form>

      <div class="social-divider">or sign up with</div>
      <div class="social-btns">
        <button class="btn-social btn-social-google" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>

    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>

  </div>
</div>

<nav class="page-nav">
  <a href="login.html">Login</a>
  <a href="register.html" class="active">Register</a>
  <a href="forgot-password.html">Forgot</a>
  <a href="reset-password.html">Reset</a>
  <a href="dashboard.html">Dashboard</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
